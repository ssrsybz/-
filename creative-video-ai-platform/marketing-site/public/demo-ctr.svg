<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="greenBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#86efac"/>
    </linearGradient>
    <linearGradient id="orangeBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fdba74"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgGradient2)"/>

  <g transform="translate(40, 30)">
    <rect width="200" height="440" fill="white" rx="8" filter="url(#shadow2)"/>
    
    <g transform="translate(20, 20)">
      <text x="0" y="0" font-size="14" fill="#1e293b" font-weight="bold">封面测试</text>
      <text x="0" y="20" font-size="10" fill="#64748b">选择 4 个封面进行 A/B 测试</text>
      
      <g transform="translate(0, 40)">
        <rect width="75" height="75" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
        <text x="37.5" y="45" font-size="28" fill="#166534" font-weight="bold" text-anchor="middle">A</text>
        <text x="37.5" y="90" font-size="10" fill="#166534" text-anchor="middle">版本 A</text>
      </g>
      
      <g transform="translate(85, 40)">
        <rect width="75" height="75" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
        <text x="37.5" y="45" font-size="28" fill="#c2410c" font-weight="bold" text-anchor="middle">B</text>
        <text x="37.5" y="90" font-size="10" fill="#c2410c" text-anchor="middle">版本 B</text>
      </g>
      
      <g transform="translate(0, 145)">
        <rect width="75" height="75" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
        <text x="37.5" y="45" font-size="28" fill="#7c3aed" font-weight="bold" text-anchor="middle">C</text>
        <text x="37.5" y="90" font-size="10" fill="#7c3aed" text-anchor="middle">版本 C</text>
      </g>
      
      <g transform="translate(85, 145)">
        <rect width="75" height="75" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
        <text x="37.5" y="45" font-size="28" fill="#1d4ed8" font-weight="bold" text-anchor="middle">D</text>
        <text x="37.5" y="90" font-size="10" fill="#1d4ed8" text-anchor="middle">版本 D</text>
      </g>
      
      <g transform="translate(0, 255)">
        <rect width="160" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3"/>
        <text x="80" y="23" font-size="11" fill="#991b1b" text-anchor="middle">输入节目标题</text>
      </g>
      
      <g transform="translate(0, 305)">
        <rect width="160" height="32" rx="6" fill="#f1f5f9"/>
        <text x="80" y="20" font-size="10" fill="#64748b" text-anchor="middle">选择测试人数: 100 人</text>
      </g>
      
      <g transform="translate(0, 350)">
        <rect width="160" height="32" rx="6" fill="#f1f5f9"/>
        <text x="80" y="20" font-size="10" fill="#64748b" text-anchor="middle">选择测试群体: 目标用户</text>
      </g>
      
      <g transform="translate(0, 400)">
        <rect width="160" height="36" rx="6" fill="url(#greenBar)"/>
        <text x="80" y="23" font-size="12" fill="white" font-weight="600" text-anchor="middle">开始测试</text>
      </g>
    </g>
  </g>

  <g transform="translate(260, 30)">
    <rect width="500" height="440" fill="white" rx="8" filter="url(#shadow2)"/>
    
    <g transform="translate(25, 25)">
      <text x="0" y="0" font-size="14" fill="#1e293b" font-weight="bold">点击率分析报告</text>
      <text x="0" y="20" font-size="10" fill="#64748b">* 真人实测数据，仅供参考</text>
      
      <g transform="translate(0, 50)">
        <text x="0" y="0" font-size="24" fill="#1e293b" font-weight="bold">测试结果</text>
        <text x="0" y="25" font-size="11" fill="#64748b">测试时间: 2024-01-15 14:30 - 14:40</text>
        <text x="0" y="42" font-size="11" fill="#64748b">测试人数: 100 人</text>
      </g>
      
      <g transform="translate(0, 110)">
        <text x="0" y="0" font-size="13" fill="#1e293b" font-weight="600">点击率对比</text>
        
        <g transform="translate(0, 20)">
          <text x="0" y="0" font-size="11" fill="#166534">版本 A</text>
          <rect x="50" y="-10" width="280" height="24" rx="4" fill="url(#greenBar)"/>
          <text x="340" y="5" font-size="12" fill="#166534" font-weight="bold">32%</text>
        </g>
        
        <g transform="translate(0, 60)">
          <text x="0" y="0" font-size="11" fill="#c2410c">版本 B</text>
          <rect x="50" y="-10" width="220" height="24" rx="4" fill="url(#orangeBar)"/>
          <text x="280" y="5" font-size="12" fill="#c2410c" font-weight="bold">25%</text>
        </g>
        
        <g transform="translate(0, 100)">
          <text x="0" y="0" font-size="11" fill="#7c3aed">版本 C</text>
          <rect x="50" y="-10" width="180" height="24" rx="4" fill="url(#purpleBar)"/>
          <text x="240" y="5" font-size="12" fill="#7c3aed" font-weight="bold">20%</text>
        </g>
        
        <g transform="translate(0, 140)">
          <text x="0" y="0" font-size="11" fill="#1d4ed8">版本 D</text>
          <rect x="50" y="-10" width="140" height="24" rx="4" fill="url(#blueBar)"/>
          <text x="200" y="5" font-size="12" fill="#1d4ed8" font-weight="bold">16%</text>
        </g>
      </g>
      
      <g transform="translate(0, 290)">
        <rect width="450" height="120" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="20" y="25" font-size="12" fill="#1e293b" font-weight="600">📊 分析建议</text>
        <text x="20" y="50" font-size="10" fill="#475569">• 版本 A 表现最佳，点击率高达 32%，建议优先使用</text>
        <text x="20" y="72" font-size="10" fill="#475569">• 版本 B 也有不错表现，可作为备选方案</text>
        <text x="20" y="94" font-size="10" fill="#475569">• 建议在不同时间段投放测试，验证数据稳定性</text>
      </g>
    </g>
  </g>

  <g transform="translate(40, 475)">
    <text x="0" y="0" font-size="10" fill="#94a3b8">真人点击测试 · 数据分析报告 · 量化决策支持</text>
  </g>
</svg>
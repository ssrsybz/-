          <text x="70" y="50" font-size="28" fill="url(#textGrad)" font-weight="bold" text-anchor="middle">科技</text>
        </g>
        
        <g transform="translate(160, 20)">
          <rect width="140" height="80" rx="6" fill="#fef3c7"/>
          <text x="70" y="50" font-size="28" fill="#92400e" font-weight="bold" text-anchor="middle">未来</text>
        </g>
        
        <g transform="translate(320, 20)">
          <rect width="140" height="80" rx="6" fill="#dbeafe"/>
          <text x="70" y="50" font-size="28" fill="#1e40af" font-weight="bold" text-anchor="middle">创新</text>
        </g>
        
        <g transform="translate(480, 20)">
          <rect width="140" height="80" rx="6" fill="#fce7f3"/>
          <text x="70" y="50" font-size="28" fill="#9d174d" font-weight="bold" text-anchor="middle">智能</text>
        </g>
      </g>
      
      <g transform="translate(0, 290)">
        <text x="0" y="0" font-size="13" fill="#1e293b" font-weight="600">AI 推荐的创意素材</text>
        
        <g transform="translate(0, 20)">
          <rect width="100" height="70" rx="4" fill="#fef3c7"/>
          <text x="50" y="40" font-size="32" text-anchor="middle">🤖</text>
        </g>
        
        <g transform="translate(120, 20)">
          <rect width="100" height="70" rx="4" fill="#dbeafe"/>
          <text x="50" y="40" font-size="32" text-anchor="middle">💡</text>
        </g>
        
        <g transform="translate(240, 20)">
          <rect width="100" height="70" rx="4" fill="#dcfce7"/>
          <text x="50" y="40" font-size="32" text-anchor="middle">🚀</text>
        </g>
        
        <g transform="translate(360, 20)">
          <rect width="100" height="70" rx="4" fill="#fce7f3"/>
          <text x="50" y="40" font-size="32" text-anchor="middle">✨</text>
        </g>
        
        <g transform="translate(480, 20)">
          <rect width="100" height="70" rx="4" fill="#e0e7ff"/>
          <text x="50" y="40" font-size="32" text-anchor="middle">🎯</text>
        </g>
        
        <g transform="translate(600, 20)">
          <rect width="100" height="70" rx="4" fill="#ffedd5"/>
          <text x="50" y="40" font-size="32" text-anchor="middle">🎬</text>
        </g>
      </g>
      
      <g transform="translate(0, 390)">
        <rect width="660" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="20" y="23" font-size="10" fill="#64748b">💡 AI 建议：使用"科技"艺术字搭配🤖素材，点击率可提升 25%</text>

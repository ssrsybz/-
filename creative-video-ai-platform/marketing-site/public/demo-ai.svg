        <rect x="20" y="35" width="620" height="45" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
        <text x="30" y="62" font-size="12" fill="#1e293b">制作一个科技感十足的视频封面，主题是人工智能...</text>
        <g transform="translate(580, 45)">
          <rect width="50" height="26" rx="4" fill="url(#magicGrad)"/>
          <text x="25" y="17" font-size="11" fill="white" font-weight="600" text-anchor="middle">生成</text>
        </g>
      </g>
      
      <g transform="translate(0, 170)">
        <text x="0" y="0" font-size="13" fill="#1e293b" font-weight="600">AI 生成的艺术字样式</text>
        
        <g transform="translate(0, 20)">

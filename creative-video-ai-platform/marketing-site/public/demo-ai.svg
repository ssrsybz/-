<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="magicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgGradient4)"/>

  <g transform="translate(40, 30)">
    <rect width="720" height="440" fill="white" rx="8" filter="url(#shadow4)"/>
    
    <g transform="translate(30, 25)">
      <text x="0" y="0" font-size="16" fill="#1e293b" font-weight="bold">AI 智能创作</text>
      <text x="0" y="22" font-size="11" fill="#64748b">一键生成艺术字、创意素材和标题建议</text>
      
      <g transform="translate(0, 50)">
        <rect width="660" height="100" rx="6" fill="#f1f5f9"/>

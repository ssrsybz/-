<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站视频采集器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      min-height: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #ffffff;
    }

    .header {
      background: linear-gradient(135deg, #FF6699 0%, #FF85A1 100%);
      padding: 18px 20px;
      color: white;
    }

    .header h1 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .header p { font-size: 12px; opacity: 0.9; }

    .content { padding: 16px 20px; }

    .port-status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      background: #F5F5F5;
    }

    .status {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      display: none;
    }

    .status.success { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; display: block; }
    .status.error { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; display: block; }
    .status.info { background: #E3F2FD; color: #1565C0; border: 1px solid #BBDEFB; display: block; }

    .button-group { display: flex; flex-direction: column; gap: 8px; }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary { background: #FF6699; color: white; }
    .btn-primary:hover { background: #FF5588; }
    .btn-primary:disabled { background: #FFB3C6; cursor: not-allowed; }
    .btn-secondary { background: #F5F5F5; color: #333; }
    .btn-secondary:hover { background: #E8E8E8; }

    .video-count {
      background: #FFF3E0; color: #E65100;
      padding: 8px 12px; border-radius: 6px;
      font-size: 13px; margin-top: 12px;
      display: none;
    }
    .video-count.show { display: block; }

    .source-info {
      background: #E8F5E9; color: #2E7D32;
      padding: 8px 12px; border-radius: 6px;
      font-size: 12px; margin-bottom: 12px;
      display: none;
    }
    .source-info.show { display: block; }
    .source-info .keyword { color: #FF6699; font-weight: 500; }

    .loading {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .log-section {
      background: #1E1E1E; border-radius: 8px;
      margin-top: 12px; overflow: hidden;
    }

    .log-header {
      background: #2D2D2D; padding: 8px 12px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #3D3D3D;
    }

    .log-header h3 { font-size: 12px; color: #E0E0E0; font-weight: 500; }

    .log-clear {
      font-size: 11px; color: #FF6699;
      background: none; border: none;
      cursor: pointer; padding: 3px 6px;
      border-radius: 4px;
    }
    .log-clear:hover { background: #3D3D3D; }

    .log-content {
      max-height: 160px; overflow-y: auto;
      padding: 8px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 10px; line-height: 1.5;
    }

    .log-content::-webkit-scrollbar { width: 5px; }
    .log-content::-webkit-scrollbar-track { background: #2D2D2D; }
    .log-content::-webkit-scrollbar-thumb { background: #4D4D4D; border-radius: 3px; }

    .log-entry {
      margin-bottom: 6px; padding: 4px 6px;
      border-radius: 3px; border-left: 3px solid;
    }
    .log-entry.info { background: #1A2332; border-left-color: #4A90E2; color: #B8D4FF; }
    .log-entry.success { background: #1A2F1E; border-left-color: #4CAF50; color: #B8E6C8; }
    .log-entry.error { background: #2F1A1A; border-left-color: #F44336; color: #FFB8B8; }
    .log-entry.warning { background: #2F2A1A; border-left-color: #FF9800; color: #FFE8B8; }

    .log-time { color: #666; font-size: 9px; margin-right: 6px; }
    .log-message { word-break: break-all; }

    .log-details {
      margin-top: 3px; padding: 4px;
      background: rgba(0,0,0,0.3);
      border-radius: 3px; font-size: 9px;
      color: #AAA; white-space: pre-wrap; word-break: break-all;
    }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #E8E8E8;
      text-align: center;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>B站视频采集器</h1>
    <p>一键采集 · 自动搜索 · 实时回传</p>
  </div>

  <div class="content">
    <div id="portStatus" class="port-status">● 正在探测 API 服务器...</div>

    <div id="status" class="status"></div>
    <div id="sourceInfo" class="source-info"></div>

    <div class="button-group">
      <button id="extractBtn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        采集视频数据
      </button>

      <button id="sendBtn" class="btn btn-primary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        发送到本地应用
      </button>

      <button id="clearBtn" class="btn btn-secondary">
        清空数据
      </button>
    </div>

    <div id="videoCount" class="video-count"></div>

    <div class="log-section">
      <div class="log-header">
        <h3>调试日志</h3>
        <button id="clearLogBtn" class="log-clear">清空</button>
      </div>
      <div id="logContent" class="log-content"></div>
    </div>
  </div>

  <div class="footer">自动探测 API 端口 · 无需手动配置</div>

  <script src="popup.js"></script>
</body>
</html>

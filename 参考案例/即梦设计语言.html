<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimeng AI - Deep Interaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        :root {
            --bg-darker: #050505;
            --bg-main: #0d0d0d;
            --bg-panel: rgba(18, 18, 18, 0.85);
            --border-light: rgba(255, 255, 255, 0.08);
            --accent-purple: #8800ff;
            --accent-blue: #0055ff;
        }

        body {
            background-color: var(--bg-darker);
            color: #eeeeee;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 玻璃质感 */
        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border-light);
        }

        /* 动态发光按钮 */
        .glow-btn {
            position: relative;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow-btn:hover {
            box-shadow: 0 0 20px rgba(136, 0, 255, 0.4);
            transform: translateY(-1px);
        }

        /* 下钻详情弹窗 */
        #detail-modal {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(40px);
            z-index: 1000;
        }

        /* 侧边栏折叠动画 */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .accordion-open .accordion-content {
            max-height: 500px;
        }
        .accordion-icon {
            transition: transform 0.3s ease;
        }
        .accordion-open .accordion-icon {
            transform: rotate(180deg);
        }

        /* 卡片动画 */
        .image-card {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: zoom-in;
        }
        .image-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* 自定义 Range */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; background: #222; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; cursor: pointer; margin-top: -4.5px; }

        /* 进度条 */
        @keyframes progress-loading { 0% { width: 0%; } 100% { width: 100%; } }
        .progress-active { animation: progress-loading 5s linear forwards; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 详情下钻层 (Modal) -->
    <div id="detail-modal" class="fixed inset-0 flex items-center justify-center p-4 lg:p-12">
        <button onclick="closeModal()" class="absolute top-8 right-8 text-white/40 hover:text-white transition-colors">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        
        <div class="w-full max-w-6xl h-full flex flex-col lg:flex-row bg-[#111] rounded-[32px] border border-white/10 overflow-hidden">
            <!-- 左侧大图预览 -->
            <div class="flex-1 bg-black flex items-center justify-center p-8 relative group">
                <div id="modal-image-placeholder" class="w-full h-full rounded-xl bg-gradient-to-tr from-gray-900 to-blue-900/20 flex items-center justify-center">
                    <span class="text-white/20 text-lg italic">高清大图预览区域</span>
                </div>
                <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="px-6 py-2 bg-white/10 backdrop-blur-md rounded-full text-sm font-medium hover:bg-white/20">查看原图</button>
                    <button class="px-6 py-2 bg-white/10 backdrop-blur-md rounded-full text-sm font-medium hover:bg-white/20">保存到画廊</button>
                </div>
            </div>
            <!-- 右侧详情数据 -->
            <div class="w-full lg:w-[400px] border-l border-white/5 p-8 overflow-y-auto no-scrollbar space-y-8">
                <div>
                    <h3 class="text-xs font-bold text-white/30 uppercase tracking-widest mb-4">提示词明细</h3>
                    <p id="modal-prompt" class="text-[15px] leading-relaxed text-white/80 bg-white/5 p-4 rounded-2xl border border-white/5">
                        Cyberpunk city at night, rain soaked streets, neon reflections, cinematic lighting, 8k resolution...
                    </p>
                    <button class="mt-4 text-[13px] text-blue-400 font-medium hover:underline">一键复制提示词</button>
                </div>
                
                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-white/30 uppercase tracking-widest">生成参数</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-3 rounded-xl">
                            <span class="block text-[10px] text-white/40 mb-1">采样器</span>
                            <span class="text-sm font-medium">Euler a</span>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl">
                            <span class="block text-[10px] text-white/40 mb-1">种子值 (Seed)</span>
                            <span class="text-sm font-medium font-mono">284910582</span>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl">
                            <span class="block text-[10px] text-white/40 mb-1">提示词相关性</span>
                            <span class="text-sm font-medium">7.5</span>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl">
                            <span class="block text-[10px] text-white/40 mb-1">生成模型</span>
                            <span class="text-sm font-medium">v2.1 Pro</span>
                        </div>
                    </div>
                </div>

                <button class="w-full py-4 bg-blue-600 rounded-2xl font-bold hover:bg-blue-500 transition-all">
                    复用此参数重新生成
                </button>
            </div>
        </div>
    </div>

    <!-- 顶部导航 -->
    <nav class="h-14 flex items-center justify-between px-6 bg-[#080808]/80 backdrop-blur-md border-b border-white/5 z-[100]">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2.5 group cursor-pointer" onclick="location.reload()">
                <div class="w-7 h-7 bg-gradient-to-tr from-[#0055ff] to-[#8800ff] rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-sm">J</span>
                </div>
                <span class="font-bold tracking-tight text-white/90 text-base">即梦 AI</span>
            </div>
            <div class="hidden lg:flex items-center gap-8 text-[13px] font-medium text-white/40">
                <a href="#" class="text-white">图片生成</a>
                <a href="#" class="hover:text-white transition-colors">视频生成</a>
                <a href="#" class="hover:text-white transition-colors">模型广场</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="h-8 w-px bg-white/5"></div>
            <button class="w-8 h-8 rounded-full border border-white/10 overflow-hidden"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"></button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        <!-- 左侧面板 -->
        <aside class="w-[300px] glass-panel flex flex-col z-40">
            <div class="flex-1 overflow-y-auto no-scrollbar p-5 space-y-6">
                
                <!-- 比例选择 -->
                <section class="space-y-3">
                    <h3 class="text-[11px] font-bold text-white/30 uppercase tracking-widest">画面比例</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setRatio(this)" class="p-3 border border-white/5 rounded-xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all">
                            <div class="w-3.5 h-5 border border-white/40 rounded-sm"></div>
                            <span class="text-[10px] text-white/40">9:16</span>
                        </button>
                        <button onclick="setRatio(this)" class="p-3 border border-blue-500/50 bg-blue-500/10 rounded-xl flex flex-col items-center gap-2 transition-all">
                            <div class="w-4 h-4 border-2 border-blue-400 rounded-sm"></div>
                            <span class="text-[10px] text-blue-400 font-bold">1:1</span>
                        </button>
                        <button onclick="setRatio(this)" class="p-3 border border-white/5 rounded-xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all">
                            <div class="w-5 h-3.5 border border-white/40 rounded-sm"></div>
                            <span class="text-[10px] text-white/40">16:9</span>
                        </button>
                    </div>
                </section>

                <!-- 步数滑块 -->
                <section class="space-y-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="flex justify-between items-end">
                        <span class="text-[11px] text-white/50 font-medium">生成张数</span>
                        <span class="text-xs font-bold text-blue-400" id="count-val">4</span>
                    </div>
                    <input type="range" min="1" max="8" value="4" class="w-full" oninput="document.getElementById('count-val').innerText = this.value">
                </section>

                <!-- 高级设置折叠 (下钻交互) -->
                <section id="adv-accordion" class="border-t border-white/5 pt-4">
                    <button onclick="toggleAccordion()" class="w-full flex items-center justify-between text-[11px] font-bold text-white/30 uppercase tracking-widest mb-2 group">
                        <span>高级设置 (Advanced)</span>
                        <svg class="accordion-icon w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="accordion-content space-y-4 pt-2">
                        <div class="space-y-2">
                            <label class="text-[10px] text-white/40">采样方法</label>
                            <select class="w-full bg-[#1a1a1a] border border-white/5 rounded-lg p-2 text-xs focus:outline-none">
                                <option>Euler a</option>
                                <option>DPM++ 2M Karras</option>
                                <option>DDIM</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] text-white/40">种子 Seed</label>
                            <input type="text" placeholder="-1 (随机)" class="w-full bg-[#1a1a1a] border border-white/5 rounded-lg p-2 text-xs focus:outline-none">
                        </div>
                    </div>
                </section>
            </div>

            <div class="p-5 border-t border-white/5 bg-[#0d0d0d]">
                <button id="generate-btn" onclick="startGeneration()" class="w-full h-12 rounded-xl glow-btn flex items-center justify-center gap-3 font-bold text-[14px]">
                    立即生成 <span class="px-1.5 py-0.5 rounded-md bg-white/20 text-[10px]">⚡️ 12</span>
                </button>
            </div>
        </aside>

        <!-- 右侧主展示区 -->
        <section class="flex-1 flex flex-col relative">
            <!-- 输入区域 -->
            <div class="px-8 pt-8 pb-4 max-w-4xl mx-auto w-full">
                <div class="bg-[#161616] border border-white/5 rounded-[24px] p-2 focus-within:border-blue-500/40 transition-all">
                    <!-- 风格标签交互 -->
                    <div class="flex gap-2 mb-2 px-2 pt-2 overflow-x-auto no-scrollbar">
                        <button onclick="addTag('赛博朋克')" class="px-3 py-1 bg-white/5 hover:bg-white/10 rounded-full text-[11px] text-white/60 transition-all whitespace-nowrap"># 赛博朋克</button>
                        <button onclick="addTag('宫崎骏风格')" class="px-3 py-1 bg-white/5 hover:bg-white/10 rounded-full text-[11px] text-white/60 transition-all whitespace-nowrap"># 宫崎骏风格</button>
                        <button onclick="addTag('写实照片')" class="px-3 py-1 bg-white/5 hover:bg-white/10 rounded-full text-[11px] text-white/60 transition-all whitespace-nowrap"># 写实照片</button>
                    </div>
                    <textarea id="prompt-input" class="w-full h-24 bg-transparent p-3 text-[15px] resize-none focus:outline-none placeholder-white/10" placeholder="写下你的创意..."></textarea>
                    <div class="flex justify-between items-center px-3 pb-2 border-t border-white/5 pt-2">
                        <span class="text-[10px] text-white/20" id="char-count">0 / 500</span>
                        <button class="text-xs text-blue-400 font-medium px-4 py-1.5 hover:bg-blue-400/10 rounded-lg transition-all">优化提示词 ✨</button>
                    </div>
                </div>
            </div>

            <!-- 展示区 -->
            <div class="flex-1 overflow-y-auto px-8 pb-10">
                <div class="max-w-5xl mx-auto">
                    <div id="results-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-5">
                        <!-- 生成中占位 -->
                        <div id="loading-card" class="hidden aspect-[3/4] rounded-[24px] bg-[#121212] border border-white/5 p-6 flex flex-col justify-end relative overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-t from-blue-600/10 to-transparent"></div>
                            <div class="relative z-10 space-y-4">
                                <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                <div>
                                    <p class="text-xs font-bold">正在渲染...</p>
                                    <div class="w-full h-1 bg-white/5 rounded-full mt-2 overflow-hidden">
                                        <div id="progress-bar" class="h-full bg-blue-500 w-0"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 静态样例卡片 -->
                        <div class="image-card aspect-[3/4] rounded-[24px] bg-[#1a1a1a] border border-white/5 overflow-hidden group relative" onclick="openModal('Cyberpunk Girl, Neon Light...', 'blue')">
                            <div class="w-full h-full bg-gradient-to-tr from-[#111] to-blue-900/20 flex items-center justify-center p-6 text-center italic text-xs text-white/20 leading-relaxed">
                                [ 赛博朋克女性角色，霓虹背景 ]
                            </div>
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="px-4 py-2 bg-white/10 backdrop-blur-md rounded-full text-xs font-bold border border-white/20">点击查看详情</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. 侧边栏折叠交互
        function toggleAccordion() {
            document.getElementById('adv-accordion').classList.toggle('accordion-open');
        }

        // 2. 比例切换交互
        function setRatio(btn) {
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => {
                b.classList.remove('border-blue-500/50', 'bg-blue-500/10');
                b.querySelector('span').classList.replace('text-blue-400', 'text-white/40');
                b.querySelector('span').classList.remove('font-bold');
            });
            btn.classList.add('border-blue-500/50', 'bg-blue-500/10');
            btn.querySelector('span').classList.replace('text-white/40', 'text-blue-400');
            btn.querySelector('span').classList.add('font-bold');
        }

        // 3. 提示词标签添加
        function addTag(tag) {
            const input = document.getElementById('prompt-input');
            input.value += (input.value ? ', ' : '') + tag;
            updateCharCount();
        }

        function updateCharCount() {
            const len = document.getElementById('prompt-input').value.length;
            document.getElementById('char-count').innerText = `${len} / 500`;
        }
        document.getElementById('prompt-input').addEventListener('input', updateCharCount);

        // 4. 下钻详情交互 (Drill-down)
        function openModal(prompt, color) {
            const modal = document.getElementById('detail-modal');
            modal.style.display = 'flex';
            document.getElementById('modal-prompt').innerText = prompt;
            const placeholder = document.getElementById('modal-image-placeholder');
            placeholder.className = `w-full h-full rounded-xl bg-gradient-to-tr from-gray-900 to-${color}-900/20 flex items-center justify-center`;
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 5. 模拟生成流程 (Progressive Feedback)
        function startGeneration() {
            const btn = document.getElementById('generate-btn');
            const loader = document.getElementById('loading-card');
            const progress = document.getElementById('progress-bar');
            
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.innerText = '正在排队...';
            
            loader.classList.remove('hidden');
            progress.classList.add('progress-active');
            
            setTimeout(() => {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.innerHTML = `立即生成 <span class="px-1.5 py-0.5 rounded-md bg-white/20 text-[10px]">⚡️ 12</span>`;
                loader.classList.add('hidden');
                progress.classList.remove('progress-active');
            }, 5000);
        }
    </script>
</body>
</html>
